[package]
name = "demo_app"
edition = "2026"
sifr-version = ">=0.3,<0.4"

[scripts]
dev = { command = "run", args = [] }
check-offline = { command = "check", args = ["--locked", "--offline"] }
publish-dry-run = { command = "publish", args = ["--dry-run", "--allow-dirty", "--no-verify"] }

[dependencies]
demo_http = { package = "sifr-demo-http", path = "../sifr-demo-http" }
demo_json_v1 = { package = "sifr-demo-json", import = "demo_json_v1", path = "../sifr-demo-json" }
demo_json_v2 = { package = "sifr-demo-json", import = "demo_json_v2", path = "../sifr-demo-json-v2" }

[dev-dependencies]
demo_test_support = { package = "sifr-demo-test-support", path = "../sifr-demo-test-support" }
